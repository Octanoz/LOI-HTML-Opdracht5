<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGP-fans Contactpagina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allerta+Stencil&family=Amarante&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="full-width">
        <!-- Afbeelding met transparante balk, smaller dan schermbreedte -->
        <!-- Links logo, rechts navigatie -->
        <nav class="blur-bg">
            <a class="material-icons" href="index.html">sports_motorsports</a>
            <ul class="nav-items">
                <li><a href="index.html">Home</a></li>
                <li><a href="circuits.html">Circuits</a></li>
                <li class="nav-checked"><a href="contact.html">Contact</a></li>
                <li><a href="champions.html">Kampioenen</a></li>
            </ul>
        </nav>
        <!-- Hoofdkop en subkop -->
        <div class="hero text-center">
            <img src="images/action/cornering.webp"
                srcset="images/action/cornering.webp 1600w, images/action/cornering_1200.webp 1200w, images/action/cornering_800.webp 800w"
                sizes="(min-width: 1440px) 1440px, 100vw" alt="MotoGP coureur in actie tijdens een race"
                class="hero-image">
            <h1 class="blur-bg">Moto<span class="italic">GP</span>-Fans</h1>
            <p class="italic blur-bg">Contactformulier</p>
        </div>
    </header>

    <main>
        <!-- Contactformulier -->
        <section id="contact-form">
            <h2 class="text-center">Wordt vandaag lid van MotoGP-Fans</h2>
            <form action="submit_form.php" method="post" class="contact-form-container flow">
                <label for="name">Naam:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>

                <fieldset>
                    <legend>Interesse in aanbiedingen:</legend>
                    <div class="radio-option">
                        <input type="radio" id="deals-no" name="deals" value="no" checked>
                        <label for="deals-no">Nee</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="nederland" name="deals" value="nederland">
                        <label for="nederland">Assen</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="duitsland" name="deals" value="duitsland">
                        <label for="duitsland">Sachsenring</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="beide" name="deals" value="beide">
                        <label for="beide">Beide</label>
                    </div>
                </fieldset>

                <label for="message">Verdere opmerkingen:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Versturen</button>
            </form>
        </section>
        <div class="splitter"></div>
        <!-- Gradient block hard limit 1/3 -->
        <section id="gradient-block">
            <!-- Embedded video -->
            <div class="video-block">
                <figure>
                    <video src="video/MotoGP.mp4" preload="metadata" controls muted loop playsinline></video>
                </figure>
            </div>
        </section>
        <div class="splitter"></div>
        <!-- Gradient block hard limit 2/3 -->
        <section id="reversed-gradient-block">
            <!-- Google Maps embed -->
            <h2 class="text-center">Hier vindt u ons kantoor</h2>
            <div class="flex-map">
                <div class="address">
                    <h3>MotoGP-Fans</h3>
                    <p>De Haar 12</p>
                    <p>9405 TE Assen</p>
                </div>
                <iframe title="location-map"
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2403.2273759064865!2d6.528672077148772!3d52.96232397218034!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c824a549098009%3A0x99dc74e0f01cfd96!2sDe%20Haar%2012%2C%209405%20TE%20Assen!5e0!3m2!1sen!2snl!4v1774261842923!5m2!1sen!2snl"
                    width="600" height="450" allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </section>
    </main>

    <!-- Footer hele breedte -->
    <footer>
        <p>&copy; 2026 MotoGP-Fans. Alle rechten voorbehouden.</p>
    </footer>
</body>

</html>
