<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGP-fans Contactpagina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allerta+Stencil&family=Amarante&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="full-width">
        <!-- Afbeelding met transparante balk, smaller dan schermbreedte -->
        <!-- Links logo, rechts navigatie -->
        <nav class="blur-bg">
            <a class="material-icons" href="index.html">sports_motorsports</a>
            <ul class="nav-items">
                <li><a href="index.html">Home</a></li>
                <li><a href="circuits.html">Circuits</a></li>
                <li class="nav-checked"><a href="contact.html">Contact</a></li>
                <li><a href="champions.html">Kampioenen</a></li>
            </ul>
        </nav>
        <!-- Hoofdkop en subkop -->
        <div class="hero text-center">
            <img src="images/action/Motorcycle-Physics-Cornering.webp" alt="MotoGP coureur in actie tijdens een race"
                class="hero-image">
            <h1 class="blur-bg">Moto<span class="italic">GP</span>-Fans</h1>
            <p class="italic blur-bg">Contactformulier</p>
        </div>
    </header>

    <main>
        <!-- Contactformulier -->
        <section class="contact-form">
            <h2 class="text-center">Wordt vandaag lid van MotoGP-Fans</h2>
            <form action="submit_form.php" method="post" class="contact-form-container flow">
                <label for="name">Naam:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>

                <fieldset>
                    <legend>Interesse in aanbiedingen:</legend>
                    <div class="radio-option">
                        <input type="radio" id="deals-no" name="deals" value="no" checked>
                        <label for="deals-no">Nee</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="nederland" name="deals" value="nederland">
                        <label for="nederland">Assen</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="duitsland" name="deals" value="duitsland">
                        <label for="duitsland">Sachsenring</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="beide" name="deals" value="beide">
                        <label for="beide">Beide</label>
                    </div>
                </fieldset>

                <label for="message">Verdere opmerkingen:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Versturen</button>
            </form>
        </section>
        <!-- Gradient block hard limit 1/3 -->
        <section class="gradient-block">
            <!-- Embedded video -->
            <div class="video-block">
            </div>
        </section>
        <!-- Gradient block hard limit 2/3 -->
        <section class="reversed-gradient-block">
            <!-- Google Maps embed -->
            <h2 class="text-center">Hier vindt u ons kantoor</h2>
            <iframe width="425" height="350"
                src="https://www.openstreetmap.org/export/embed.html?bbox=6.506609916687012%2C52.95420988461848%2C6.5339040756225595%2C52.96531295896227&amp;layer=mapnik">
            </iframe>
            <small>
                <a href="https://www.openstreetmap.org/?#map=16/52.95976/6.52026&amp;layers=N">Grotere kaart</a>
            </small>
            <div class="embed-map-responsive">
                <div class="embed-map-container">
                    <iframe class="embed-map-frame" frameborder="0" scrolling="no" marginheight="0" marginwidth="0"
                        src="https://maps.google.com/maps?q=TT%20circuit%20Assen&t=m&z=11&ie=UTF8&iwloc=B&output=embed"></iframe>
                    <a href="https://embed-maps.org">how to add google maps to my website</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer hele breedte -->
    <footer>
        <p>&copy; 2026 MotoGP-Fans. Alle rechten voorbehouden.</p>
    </footer>
</body>

</html>
